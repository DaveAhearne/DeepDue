<div class="log-line error">
    <span class="log-line-prefix">→</span>
    <span class="log-line-node">error</span>
    <span class="log-line-msg">{{ message }}</span>
</div>

<div id="log-header" class="log-header" hx-swap-oob="true">
    <div class="status-dot error"></div>
    <span class="log-label">Error</span>
    <span class="log-meta" id="log-meta"></span>
</div>
